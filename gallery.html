<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A photo gallery showcasing the beautiful exotic pheasants, chicks, and scenery at Bent Cypress Homestead.">
    <title>Photo Gallery - Bent Cypress Homestead</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Noto+Sans+JP:wght@400;700&family=Knewave&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="selection:bg-amber-500 selection:text-white">

    <header class="py-10">
        <div class="container mx-auto text-center">
            <a href="index.html" class="text-4xl md:text-5xl hero-font inline-block" style="color: #FFD700; text-shadow: 2px 2px 6px rgba(0,0,0,0.7);">
                Bent Cypress Homestead
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <h1 class="section-title">Photo Gallery</h1>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/redgolden1.jpg" alt="A magnificent Red Golden Pheasant stands in the grass, its vibrant red and gold plumage shining in the sunlight." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/redgolden5.jpg" alt="A pair of Red Golden Pheasants, with the male displaying his brilliant red and gold feathers next to a hen." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/melanchicks.jpg" alt="A group of fluffy, black Melanistic pheasant chicks huddled together in a brooder with wood shavings." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/courtnixquail.jpg" alt="A covey of Coturnix quail on the ground, their speckled brown feathers providing camouflage." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/babytrio.jpg" alt="Three young Red Golden pheasant chicks with developing feathers exploring their surroundings." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/redgoldenchicks.jpg" alt="A clutch of newly hatched Red Golden pheasant chicks, small and downy, in a brooder." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/meleggs.jpg" alt="Several pale, greenish-blue Melanistic pheasant eggs nestled in an incubator tray." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/sunsetrose.jpg" alt="A single, vibrant pink rose silhouetted against the warm glow of a sunset on the homestead." class="w-full h-full object-cover">
            </div>
            <div class="aspect-square rounded-2xl overflow-hidden shadow-xl border-2 border-amber-500 border-opacity-20 hover:border-red-500 hover:border-opacity-60 transition-all duration-300 transform hover:scale-105">
                <img src="images/billw.jpg" alt="owner of the homestead holding up a rat snake that was eating his eggs." class="w-full h-full object-cover"> 
            </div>
        </div>
    </main>

    <footer class="mt-16 text-center">
        <div class="container mx-auto px-6">
            <p class="text-sm">&copy; <span id="currentYear"></span> Bent Cypress Homestead. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
